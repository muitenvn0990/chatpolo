<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevChat - Realtime App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #e2e8f0; margin: 0; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #334155; }
        .lucide { width: 1.15rem; height: 1.15rem; display: inline-block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-animate { animation: fadeIn 0.2s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.ChatSDK = {
            initializeApp, getAuth, signInAnonymously, signInWithCustomToken, 
            onAuthStateChanged, getFirestore, collection, addDoc, 
            serverTimestamp, onSnapshot, doc, setDoc
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        function App() {
            const [status, setStatus] = useState('loading');
            const [user, setUser] = useState(null);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [room, setRoom] = useState(sessionStorage.getItem('active_room') || 'chung');
            const [onlineUsers, setOnlineUsers] = useState([]);
            const [username, setUsername] = useState(localStorage.getItem('chat_username') || '');
            const [modalOpen, setModalOpen] = useState(false);
            
            const scrollRef = useRef(null);
            const dbRef = useRef(null);

            const roomList = [
                { id: 'chung', name: 'Sảnh chung', icon: 'hash' },
                { id: 'lap-trinh', name: 'Lập trình', icon: 'code' },
                { id: 'thao-luan', name: 'Thảo luận', icon: 'message-square' }
            ];

            useEffect(() => {
                const init = async () => {
                    let retry = 0;
                    while (!window.ChatSDK && retry < 50) {
                        await new Promise(r => setTimeout(r, 100));
                        retry++;
                    }

                    if (!window.ChatSDK) {
                        setStatus('error');
                        return;
                    }

                    try {
                        const config = {
                            apiKey: "AIzaSyD79jXL1tXOWzEV1Nvrme_t7FurqAa8UO8",
                            authDomain: "muitenvn-b0e81.firebaseapp.com",
                            projectId: "muitenvn-b0e81",
                            storageBucket: "muitenvn-b0e81.firebasestorage.app",
                            messagingSenderId: "226380058850",
                            appId: "1:226380058850:web:12c9189417b8fdcb8d0ebb",
                            measurementId: "G-QCS9EKVNWJ"
                        };

                        const sdk = window.ChatSDK;
                        const appId = 'muitenvn-chat';
                        
                        const app = sdk.initializeApp(config);
                        const auth = sdk.getAuth(app);
                        dbRef.current = sdk.getFirestore(app);

                        await sdk.signInAnonymously(auth);

                        sdk.onAuthStateChanged(auth, (u) => {
                            if (u) {
                                setUser(u);
                                setStatus('ready');
                                const userDoc = sdk.doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'presence', u.uid);
                                sdk.setDoc(userDoc, {
                                    uid: u.uid,
                                    name: username || `User_${u.uid.slice(0, 4)}`,
                                    lastSeen: sdk.serverTimestamp()
                                }, { merge: true });
                            }
                        });
                    } catch (err) {
                        console.error(err);
                        setStatus('error');
                    }
                };
                init();
            }, []);

            useEffect(() => {
                if (status !== 'ready' || !user) return;
                const sdk = window.ChatSDK;
                const appId = 'muitenvn-chat';
                sessionStorage.setItem('active_room', room);

                const qMsg = sdk.collection(dbRef.current, 'artifacts', appId, 'public', 'data', `room_${room}`);
                const unsubMsg = sdk.onSnapshot(qMsg, (snap) => {
                    const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setMessages(list.sort((a, b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0)));
                }, (err) => setStatus('error'));

                const qUser = sdk.collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'presence');
                const unsubUser = sdk.onSnapshot(qUser, (snap) => {
                    setOnlineUsers(snap.docs.map(d => d.data()));
                }, (err) => console.error(err));

                return () => { unsubMsg(); unsubUser(); };
            }, [user, room, status]);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
                if (window.lucide) lucide.createIcons();
            }, [messages, room, status]);

            const handleSend = async (e) => {
                e.preventDefault();
                if (!input.trim() || !user) return;
                const text = input;
                setInput('');
                const sdk = window.ChatSDK;
                const appId = 'muitenvn-chat';
                try {
                    await sdk.addDoc(sdk.collection(dbRef.current, 'artifacts', appId, 'public', 'data', `room_${room}`), {
                        text, uid: user.uid, sender: username || `User_${user.uid.slice(0, 4)}`, timestamp: sdk.serverTimestamp()
                    });
                } catch (e) { console.error(e); }
            };

            const saveUsername = (e) => {
                e.preventDefault();
                localStorage.setItem('chat_username', username);
                setModalOpen(false);
                if (user) {
                    const sdk = window.ChatSDK;
                    const appId = 'muitenvn-chat';
                    sdk.setDoc(sdk.doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'presence', user.uid), { name: username }, { merge: true });
                }
            };

            if (status === 'loading') return (
                <div className="h-screen flex items-center justify-center bg-slate-950">
                    <div className="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
            );

            if (status === 'error') return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-950 text-white p-8 text-center">
                    <i data-lucide="alert-triangle" className="w-12 h-12 text-red-500 mx-auto mb-4"></i>
                    <h2 className="text-xl font-bold text-red-400">Lỗi kết nối cơ sở dữ liệu!</h2>
                    <p className="text-slate-400 mt-2 max-w-md">Ngọc ơi, đừng quên bật <b>Firestore Database (Test mode)</b> và <b>Authentication (Anonymous)</b> trên Firebase Console nhé!</p>
                </div>
            );

            return (
                <div className="flex h-screen bg-[#020617] text-slate-200 overflow-hidden">
                    <aside className="w-72 bg-[#0f172a] border-r border-slate-800 hidden md:flex flex-col">
                        <div className="p-6 border-b border-slate-800 flex items-center gap-3">
                            <div className="bg-blue-600 p-2 rounded-xl">
                                <i data-lucide="zap" className="text-white w-5 h-5"></i>
                            </div>
                            <h1 className="font-black text-xl italic uppercase">DevChat</h1>
                        </div>
                        <nav className="flex-1 p-4 space-y-1">
                            {roomList.map(r => (
                                <button key={r.id} onClick={() => setRoom(r.id)}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${room === r.id ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}>
                                    <i data-lucide={r.icon} className="w-4 h-4"></i>
                                    <span className="text-sm font-bold">{r.name}</span>
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 border-t border-slate-800" onClick={() => setModalOpen(true)}>
                            <div className="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 cursor-pointer">
                                <div className="w-10 h-10 bg-slate-800 border border-slate-700 rounded-lg flex items-center justify-center font-bold text-blue-400">
                                    {username ? username[0].toUpperCase() : 'U'}
                                </div>
                                <div className="flex-1 min-w-0">
                                    <p className="text-sm font-bold truncate">{username || 'Người dùng'}</p>
                                    <p className="text-[10px] text-slate-500 italic">Thiết lập hồ sơ</p>
                                </div>
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col">
                        <header className="h-20 border-b border-slate-800 flex items-center justify-between px-8">
                            <div>
                                <h2 className="font-black text-lg flex items-center gap-2">
                                    <span className="text-blue-500">#</span> {roomList.find(r => r.id === room)?.name}
                                </h2>
                                <span className="text-[10px] font-bold text-slate-500 uppercase">{onlineUsers.length} Online</span>
                            </div>
                        </header>

                        <div ref={scrollRef} className="flex-1 overflow-y-auto p-8 space-y-6 custom-scrollbar">
                            {messages.map((m, i) => (
                                <div key={m.id || i} className={`flex gap-4 msg-animate ${m.uid === user.uid ? 'flex-row-reverse' : ''}`}>
                                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-black text-white ${m.uid === user.uid ? 'bg-blue-600' : 'bg-slate-800'}`}>
                                        {m.sender ? m.sender[0].toUpperCase() : '?'}
                                    </div>
                                    <div className={`flex flex-col max-w-[70%] ${m.uid === user.uid ? 'items-end' : ''}`}>
                                        <span className="text-[10px] font-bold text-slate-500 mb-1">{m.sender}</span>
                                        <div className={`px-4 py-2 rounded-2xl text-sm ${m.uid === user.uid ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-slate-800 rounded-tl-none'}`}>
                                            {m.text}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        <footer className="p-6">
                            <form onSubmit={handleSend} className="max-w-4xl mx-auto flex gap-3">
                                <input value={input} onChange={e => setInput(e.target.value)}
                                    placeholder="Viết tin nhắn..."
                                    className="flex-1 bg-slate-900 border border-slate-800 rounded-2xl px-6 py-4 text-sm outline-none focus:ring-2 focus:ring-blue-500/50" />
                                <button type="submit" disabled={!input.trim()} className="px-8 bg-blue-600 rounded-2xl font-bold text-xs uppercase tracking-widest transition-all hover:bg-blue-500 disabled:opacity-30">
                                    Gửi
                                </button>
                            </form>
                        </footer>
                    </main>

                    {modalOpen && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 flex items-center justify-center p-6">
                            <div className="bg-[#0f172a] border border-slate-800 rounded-3xl p-8 w-full max-w-sm">
                                <h3 className="text-xl font-black text-center mb-6">ĐỔI BIỆT DANH</h3>
                                <form onSubmit={saveUsername} className="space-y-4">
                                    <input autoFocus value={username} onChange={e => setUsername(e.target.value)} maxLength={15} placeholder="Nhập biệt danh..."
                                        className="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white outline-none" />
                                    <div className="flex gap-2">
                                        <button type="submit" className="flex-1 py-3 bg-blue-600 rounded-xl font-bold">Lưu</button>
                                        <button type="button" onClick={() => setModalOpen(false)} className="px-6 py-3 bg-slate-800 rounded-xl font-bold">Hủy</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
