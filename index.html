<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevChat - Realtime App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 h-screen overflow-hidden">

    <div id="app" class="flex h-full w-full">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 border-r border-slate-800 hidden md:flex flex-col">
            <div class="p-4 border-b border-slate-800 flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-900/20">
                    <i class="fas fa-comments text-white"></i>
                </div>
                <h1 class="font-bold text-lg tracking-tight">DevChat</h1>
            </div>
            
            <div class="flex-1 overflow-y-auto p-3 space-y-1 custom-scrollbar">
                <p class="text-[10px] font-bold text-slate-500 px-3 py-2 uppercase tracking-[0.1em]">Kênh thảo luận</p>
                <div id="room-list">
                    <!-- Rooms will be injected here -->
                </div>
            </div>

            <div class="p-4 bg-slate-900/50 border-t border-slate-800">
                <div class="flex items-center gap-3">
                    <div id="user-avatar" class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-500 rounded-full flex items-center justify-center text-white font-bold shadow-md">?</div>
                    <div class="flex-1 min-w-0">
                        <p id="display-username" class="text-sm font-medium truncate">Đang tải...</p>
                        <p id="display-id" class="text-[10px] text-slate-500 truncate">#id</p>
                    </div>
                    <button onclick="toggleSettings()" class="text-slate-500 hover:text-white transition-colors">
                        <i class="fas fa-cog"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Chat -->
        <main class="flex-1 flex flex-col min-w-0 relative bg-slate-950">
            <header class="h-16 border-b border-slate-800 flex items-center justify-between px-6 bg-slate-900/30 backdrop-blur-md z-10">
                <div class="flex items-center gap-3">
                    <i class="fas fa-hashtag text-slate-500"></i>
                    <h2 id="active-room-name" class="font-bold text-lg text-slate-100">Sảnh chung</h2>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 px-3 py-1 bg-slate-800/50 border border-slate-700/50 rounded-full text-[10px] font-medium">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                        <span id="online-count">0</span> Đang online
                    </div>
                </div>
            </header>

            <div id="messages-container" class="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar">
                <!-- Messages will be injected here -->
            </div>

            <div class="p-4 bg-slate-900/30 border-t border-slate-800">
                <form id="chat-form" class="max-w-5xl mx-auto flex items-center gap-3">
                    <input 
                        type="text" 
                        id="message-input" 
                        placeholder="Nhập nội dung tin nhắn..."
                        class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all placeholder:text-slate-500"
                        autocomplete="off"
                    >
                    <button type="submit" class="p-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl transition-all active:scale-95 shadow-lg shadow-blue-900/40">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </main>

        <!-- Members Sidebar -->
        <aside class="w-64 bg-slate-900 border-l border-slate-800 hidden lg:flex flex-col">
            <div class="p-4 border-b border-slate-800">
                <h3 class="font-semibold text-xs text-slate-400 uppercase tracking-widest flex items-center gap-2">
                    <i class="fas fa-users text-xs"></i> Thành viên
                </h3>
            </div>
            <div id="members-list" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
                <!-- Online members will be injected here -->
            </div>
        </aside>
    </div>

    <!-- Username Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 w-full max-w-sm shadow-2xl">
            <h3 class="text-xl font-bold mb-4 text-white">Hồ sơ người dùng</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">Tên hiển thị</label>
                    <input 
                        type="text" 
                        id="username-input" 
                        class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500/50"
                        placeholder="Nguyễn Thế Ngọc..."
                    >
                </div>
                <div class="flex gap-2">
                    <button onclick="saveSettings()" class="flex-1 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg font-bold text-white transition-all">Lưu</button>
                    <button onclick="toggleSettings()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg font-medium text-slate-300">Hủy</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'github-chat-static';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let currentUsername = localStorage.getItem('chat_username') || '';
        let activeRoom = 'chung';

        const rooms = [
            { id: 'chung', name: 'Sảnh chung', icon: 'fa-house' },
            { id: 'lap-trinh', name: 'Lập trình', icon: 'fa-code' },
            { id: 'giai-tri', name: 'Giải trí', icon: 'fa-gamepad' }
        ];

        // UI Elements
        const msgContainer = document.getElementById('messages-container');
        const chatForm = document.getElementById('chat-form');
        const msgInput = document.getElementById('message-input');
        const roomList = document.getElementById('room-list');
        const membersList = document.getElementById('members-list');
        const onlineCount = document.getElementById('online-count');

        // Init App
        async function init() {
            // Render rooms
            roomList.innerHTML = rooms.map(room => `
                <button onclick="switchRoom('${room.id}')" id="room-${room.id}" class="room-btn w-full flex items-center gap-3 px-3 py-2 rounded-md transition-all text-slate-400 hover:bg-slate-800 hover:text-white">
                    <i class="fas ${room.icon} text-sm"></i>
                    <span class="font-medium text-sm">${room.name}</span>
                </button>
            `).join('');
            
            updateRoomUI();

            // Auth
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUser = user;
                    if (!currentUsername) currentUsername = `User_${user.uid.slice(0, 4)}`;
                    updateUserUI();
                    updateOnlineStatus();
                    loadMessages();
                    loadMembers();
                } else {
                    await signInAnonymously(auth);
                }
            });
        }

        window.switchRoom = (id) => {
            activeRoom = id;
            document.getElementById('active-room-name').innerText = rooms.find(r => r.id === id).name;
            updateRoomUI();
            loadMessages();
        };

        function updateRoomUI() {
            document.querySelectorAll('.room-btn').forEach(btn => {
                btn.classList.remove('bg-slate-800', 'text-white');
                btn.classList.add('text-slate-400');
            });
            const activeBtn = document.getElementById(`room-${activeRoom}`);
            activeBtn.classList.add('bg-slate-800', 'text-white');
            activeBtn.classList.remove('text-slate-400');
        }

        function updateUserUI() {
            document.getElementById('display-username').innerText = currentUsername;
            document.getElementById('display-id').innerText = `#${currentUser.uid.slice(0, 6)}`;
            document.getElementById('user-avatar').innerText = currentUsername[0].toUpperCase();
        }

        async function updateOnlineStatus() {
            if (!currentUser) return;
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'online_users', currentUser.uid);
            await setDoc(userRef, {
                uid: currentUser.uid,
                username: currentUsername,
                lastSeen: serverTimestamp()
            }, { merge: true });
        }

        let unsubscribeMsgs = null;
        function loadMessages() {
            if (unsubscribeMsgs) unsubscribeMsgs();
            
            const q = collection(db, 'artifacts', appId, 'public', 'data', `msg_${activeRoom}`);
            unsubscribeMsgs = onSnapshot(q, (snapshot) => {
                const msgs = snapshot.docs.map(doc => doc.data())
                    .sort((a, b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
                
                msgContainer.innerHTML = msgs.map(msg => {
                    const isMe = msg.uid === currentUser.uid;
                    const time = msg.timestamp ? new Date(msg.timestamp.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '...';
                    return `
                        <div class="flex gap-4 ${isMe ? 'flex-row-reverse' : ''}">
                            <div class="w-10 h-10 rounded-xl flex-shrink-0 flex items-center justify-center font-bold shadow-md ${isMe ? 'bg-blue-600' : 'bg-slate-800'} text-white">
                                ${msg.username[0].toUpperCase()}
                            </div>
                            <div class="flex flex-col max-w-[75%] ${isMe ? 'items-end' : 'items-start'}">
                                <div class="flex items-baseline gap-2 mb-1">
                                    <span class="text-xs font-bold text-slate-400">${msg.username}</span>
                                    <span class="text-[9px] text-slate-600">${time}</span>
                                </div>
                                <div class="${isMe ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-slate-800 text-slate-300 rounded-tl-none border border-slate-700/50'} px-4 py-2 rounded-2xl text-sm shadow-sm">
                                    ${msg.text}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                msgContainer.scrollTop = msgContainer.scrollHeight;
            });
        }

        function loadMembers() {
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'online_users');
            onSnapshot(q, (snapshot) => {
                const members = snapshot.docs.map(doc => doc.data());
                onlineCount.innerText = members.length;
                membersList.innerHTML = members.map(m => `
                    <div class="flex items-center gap-3">
                        <div class="relative">
                            <div class="w-8 h-8 bg-slate-800 rounded-lg flex items-center justify-center text-xs font-bold border border-slate-700 text-slate-400">
                                ${m.username[0].toUpperCase()}
                            </div>
                            <div class="absolute -bottom-1 -right-1 w-2.5 h-2.5 bg-green-500 border-2 border-slate-900 rounded-full"></div>
                        </div>
                        <div class="min-w-0">
                            <p class="text-xs font-medium text-slate-300 truncate">${m.username}</p>
                            <p class="text-[9px] text-slate-500 font-mono">online</p>
                        </div>
                    </div>
                `).join('');
            });
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = msgInput.value.trim();
            if (!text || !currentUser) return;

            msgInput.value = '';
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `msg_${activeRoom}`), {
                text,
                uid: currentUser.uid,
                username: currentUsername,
                timestamp: serverTimestamp()
            });
        };

        window.toggleSettings = () => {
            const modal = document.getElementById('settings-modal');
            modal.classList.toggle('hidden');
            if (!modal.classList.contains('hidden')) {
                document.getElementById('username-input').value = currentUsername;
            }
        };

        window.saveSettings = async () => {
            const newName = document.getElementById('username-input').value.trim();
            if (newName) {
                currentUsername = newName;
                localStorage.setItem('chat_username', newName);
                updateUserUI();
                updateOnlineStatus();
                toggleSettings();
                loadMessages(); // reload to update current messages display
            }
        };

        init();
    </script>
</body>
</html>
